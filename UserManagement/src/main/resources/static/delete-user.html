<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #ef4444;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ef4444;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #dc2626;
        }
        
        .warning-text {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <a href="users_manage.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Management</a>
    <div class="header">
        <h1>Delete User</h1>
        <p>Remove a user from the system</p>
    </div>
    <div class="container">
        <div class="form-group">
            <label for="userId">User ID</label>
            <input type="number" id="userId" placeholder="Enter User ID to delete">
        </div>
        <button type="button" id="deleteBtn">Delete User</button>
        <p class="warning-text"><i class="fa-solid fa-triangle-exclamation"></i> This action cannot be undone.</p>
        <div id="message"></div>
    </div>
    <script>
        document.getElementById('deleteBtn').addEventListener('click', async function() {
            const id = document.getElementById('userId').value;
            const messageEl = document.getElementById('message');
            if(!id) {
                messageEl.textContent = 'Please enter a User ID.';
                messageEl.className = 'error';
                return;
            }

            if(confirm('Are you certain you want to delete this user?')) {
                messageEl.textContent = 'Processing...';
                messageEl.className = '';
                try {
                    const response = await fetch(`/deleteUser/${id}`, { method: 'DELETE' });
                    const text = await response.text();
                    if(response.ok) {
                        messageEl.textContent = text || 'User deleted successfully.';
                        messageEl.className = 'success';
                        document.getElementById('userId').value = '';
                    } else {
                        messageEl.textContent = text || 'Failed to delete user.';
                        messageEl.className = 'error';
                    }
                } catch(err) {
                    console.error(err);
                    messageEl.textContent = 'Error occurred.';
                    messageEl.className = 'error';
                }
            }
        });
    </script>
</body>
</html>
